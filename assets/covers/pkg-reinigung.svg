<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Paket Reinigungsbetrieb">
  <defs>
    <linearGradient id="g_pkg_reinigung" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#445566"/>
      <stop offset="0.55" stop-color="#7E9389" stop-opacity="0.75"/>
      <stop offset="1" stop-color="#44524B"/>
    </linearGradient>
    <pattern id="p_pkg_reinigung" patternUnits="userSpaceOnUse" width="40" height="40" patternTransform="rotate(0)">
      <circle cx="20" cy="20" r="0.9" fill="#ffffff" fill-opacity="0.12"/>
    </pattern>
    <radialGradient id="rg_pkg_reinigung" cx="0.7" cy="0.25" r="0.9">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="450" fill="url(#g_pkg_reinigung)"/>
  <rect width="800" height="450" fill="url(#p_pkg_reinigung)"/>
  <rect width="800" height="450" fill="url(#rg_pkg_reinigung)"/>
  <!-- Sage-Overlay für Marken-Anmutung -->
  <rect width="800" height="450" fill="#5F7066" fill-opacity="0.18"/>
  <!-- Akzent-Linie unten links -->
  <line x1="60" y1="386" x2="140" y2="386" stroke="#C99B45" stroke-width="2"/>
  <text x="60" y="412" font-family="Inter, sans-serif" font-size="13" font-weight="500" letter-spacing="2.4" fill="#ffffff" fill-opacity="0.88">PAKET REINIGUNGSBETRIEB</text>
  <!-- Großes Icon in der Mitte -->
  <g transform="translate(348,150) scale(1.04)" color="#ffffff" opacity="0.95">
    <path d="M50 10s28 28 28 48a28 28 0 01-56 0c0-20 28-48 28-48z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
  </g>
  <!-- Gold-Marker rechts oben -->
  <circle cx="740" cy="60" r="4" fill="#C99B45"/>
  <text x="722" y="64" font-family="Inter, sans-serif" font-size="11" letter-spacing="1.6" fill="#ffffff" fill-opacity="0.7" text-anchor="end">HERWARDTIMM</text>
